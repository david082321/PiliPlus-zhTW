name: 功能請求
description: 對於功能的一些建議
labels: [ "enhancement" ]
title: "[FR] "
body:

  - type: checkboxes
    id: checklist
    attributes:
      label: 檢查清單
      options:
        - label: 搜尋了 [歷史 issue](https://github.com/david082321/PiliPlus-zhTW/issues?q=is%3Aissue) ，並未發現相同功能請求
          required: true
        - label: 正在使用最新版本。
          required: true
        - label: 設定中未搜尋到該功能
          required: true

  - type: checkboxes
    id: assign
    attributes:
      label: Assign
      options:
        - label: self-assign
          required: false

  - type: textarea
    id: desc
    attributes:
      label: 功能描述
      description: 請提供對所請求功能的清晰描述。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解決方案
      description: 如果你有任何關於如何實現這個功能的想法或建議，請在這裡提供。

  - type: textarea
    id: addition
    attributes:
      label: 其他
      description: 請提供已實現該功能或類似功能的程式
